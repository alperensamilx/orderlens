{% extends 'analyzer/base.html' %}
{% block title %}OrderLens - Log In{% endblock %}
{% block content %}
    <div class="card">
        <h2>Log In</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="btn" type="submit">Log In</button>
        </form>
        <p class="muted">Don't have an account? <a href="{% url 'analyzer:register' %}">Sign up</a></p>
    </div>
{% endblock %}
