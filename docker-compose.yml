services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: orderlens
      POSTGRES_USER: orderlens
      POSTGRES_PASSWORD: orderlens
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  web:
    build: .
    command: sh -c "python manage.py migrate && gunicorn datalens.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - media_data:/app/media
    ports:
      - "8000:8000"
    environment:
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
      DATABASE_URL: postgres://orderlens:orderlens@db:5432/orderlens
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      - db
      - redis

  worker:
    build: .
    command: celery -A datalens worker -l info
    volumes:
      - media_data:/app/media
    environment:
      DATABASE_URL: postgres://orderlens:orderlens@db:5432/orderlens
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
  media_data:
