databases:
  - name: orderlens-db
    plan: free

services:
  - type: redis
    name: orderlens-redis
    plan: free
    ipAllowList: []

  - type: web
    name: orderlens
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate && python manage.py seed_demo"
    # Render's free plan doesn't support a separate "worker" service type, so the
    # Celery worker runs as a background (daemonized) process inside the same web
    # dyno, alongside gunicorn. On a paid plan this should be split into its own
    # `type: worker` service instead (see docker-compose.yml for that setup).
    # --pool=solo --concurrency=1 avoids Celery forking extra worker processes
    # (its default prefork pool spawns one per CPU) — the free instance only has
    # 512MB total, shared with gunicorn, and was OOM-crashing without this.
    startCommand: "celery -A datalens worker -l info --pool=solo --concurrency=1 --detach && gunicorn datalens.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --threads 2"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        fromDatabase:
          name: orderlens-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: orderlens-redis
          property: connectionString
