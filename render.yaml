databases:
  - name: orderlens-db
    plan: free

services:
  - type: redis
    name: orderlens-redis
    plan: free
    ipAllowList: []

  - type: web
    name: orderlens
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate && python manage.py seed_demo"
    startCommand: "gunicorn datalens.wsgi:application"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        fromDatabase:
          name: orderlens-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: orderlens-redis
          property: connectionString

  - type: worker
    name: orderlens-worker
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "celery -A datalens worker -l info"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: orderlens-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: orderlens-redis
          property: connectionString
